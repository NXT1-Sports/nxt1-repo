# Firebase App Hosting Configuration - 2026 Best Practices
# @see https://firebase.google.com/docs/app-hosting/build-monorepos
#
# For Turborepo monorepos, we bypass the automatic Angular adapter
# which fails to parse JSON output due to Turborepo's prefixed logging

# Point to the Angular app directory
rootDirectory: apps/web

# Explicitly specify the server entry point (path from workspace root)
scripts:
  runCommand: node apps/web/dist/nxt1-web/server/server.mjs

# Runtime configuration
runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 1
  maxInstances: 10

# Environment variables
env:
  - variable: NODE_VERSION
    value: '22'
  - variable: NODE_ENV
    value: 'production'

  # Allow SSR for Firebase App Hosting domains (Angular CommonEngine host validation)
  - variable: NG_ALLOWED_HOSTS
    value: 'nxt1-repo--nxt-1-v2.us-east4.hosted.app,nxt1-repo--nxt-1-staging-v2.us-east4.hosted.app,localhost,127.0.0.1'

  # App Hosting builds @nxt1/core as part of the web pipeline, and that build
  # needs devDependencies for TypeScript declarations (e.g. vitest and type-only packages).
  - variable: NPM_CONFIG_PRODUCTION
    value: 'false'
  - variable: NPM_CONFIG_INCLUDE
    value: 'dev'

# Custom headers for all responses
headers:
  # Security headers
  - source: '**'
    headers:
      - header: X-Content-Type-Options
        value: nosniff
      - header: X-Frame-Options
        value: SAMEORIGIN
      - header: X-XSS-Protection
        value: '1; mode=block'
      - header: Referrer-Policy
        value: strict-origin-when-cross-origin

  # Cache static assets aggressively
  - source: '**/*.{js,css,woff2,woff,ttf,png,jpg,jpeg,gif,svg,ico,webp}'
    headers:
      - header: Cache-Control
        value: 'public, max-age=31536000, immutable'

  # Don't cache HTML pages (SSR generates fresh content)
  - source: '**/*.html'
    headers:
      - header: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
