<!-- 
  Root Application Template
  
  Architecture:
  - Router outlet always rendered for SSR hydration compatibility
  - Loading overlay shown as overlay (not blocking)
  - Error boundary for critical failures
-->

<!-- Main Application Content - Always rendered for SSR compatibility -->
<router-outlet />

<!-- Loading Overlay (non-blocking) -->
@if (loading()) {
  <div class="app-loading-overlay">
    <div class="loading-content">
      <div class="logo-container">
        <img src="assets/images/nxt1-logo.svg" alt="NXT1 Sports" class="logo" width="120" height="40" />
      </div>
      <div class="spinner"></div>
      <p class="loading-text">Loading...</p>
    </div>
  </div>
}

<!-- Critical Error State -->
@if (error()) {
  <div class="app-error-container">
    <div class="error-content">
      <h1>Something went wrong</h1>
      <p class="error-message">{{ error() }}</p>
      <button class="btn btn-primary" (click)="ngOnInit()">Try Again</button>
    </div>
  </div>
}
