<!-- 
  Root Application Template (2026 Professional Pattern)
  
  Architecture:
  - Uses Angular's standard RouterOutlet for clean SSR and web routing
  - No Ionic shell on web — Ionic is for mobile app only
  - Loading overlay shown during initial auth resolution
  - Error boundary for critical failures
-->

<!-- Main Application Shell -->

<router-outlet />

<!-- Loading Overlay (non-blocking) -->
@if (loading()) {
  <div class="fixed inset-0 z-modal flex items-center justify-center bg-bg-primary">
    <div class="flex flex-col items-center gap-lg">
      <div class="flex items-center justify-center">
        <img src="assets/images/nxt1-logo.svg" alt="NXT1 Sports" class="h-auto w-[120px]" width="120" height="40" />
      </div>
      <div class="h-10 w-10 animate-spin-slow rounded-full border-[3px] border-border border-t-primary"></div>
      <p class="text-sm uppercase tracking-[2px] text-text-secondary">Loading...</p>
    </div>
  </div>
}

<!-- App Download Promotion Bar (scroll-triggered, smooth slide transition) -->
@if (downloadBar.shouldRender()) {
  <nxt1-app-download-bar
    [visible]="downloadBar.isVisible()"
    [bottomOffset]="downloadBar.bottomOffset()"
    (dismissed)="downloadBar.dismiss()"
  />
}

<!-- Critical Error State -->
@if (error()) {
  <div class="fixed inset-0 flex items-center justify-center bg-bg-primary p-lg">
    <div class="max-w-[400px] text-center">
      <h1 class="mb-md text-2xl text-text-primary">Something went wrong</h1>
      <p class="mb-lg leading-relaxed text-text-secondary">{{ error() }}</p>
      <button
        class="inline-flex cursor-pointer items-center justify-center gap-sm rounded-md bg-primary px-md py-sm font-brand text-base font-semibold uppercase tracking-wide text-black transition-colors duration-fast hover:bg-primary-600 disabled:cursor-not-allowed disabled:opacity-50"
        (click)="ngOnInit()"
      >
        Try Again
      </button>
    </div>
  </div>
}
