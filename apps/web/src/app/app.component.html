<!-- 
  Root Application Template (2026 Professional Pattern)
  
  Architecture:
  - Uses Angular's standard RouterOutlet for clean SSR and web routing
  - No Ionic shell on web — Ionic is for mobile app only
  - Loading overlay shown during initial auth resolution
  - Error boundary for critical failures
-->

<!-- Main Application Shell -->
<router-outlet />

<!-- Loading Overlay (non-blocking) -->
@if (loading()) {
  <div class="bg-bg-primary z-modal fixed inset-0 flex items-center justify-center">
    <div class="gap-lg flex flex-col items-center">
      <div class="flex items-center justify-center">
        <img src="assets/images/nxt1-logo.svg" alt="NXT1 Sports" class="h-auto w-[120px]" width="120" height="40" />
      </div>
      <div class="border-border border-t-primary animate-spin-slow h-10 w-10 rounded-full border-[3px]"></div>
      <p class="text-text-secondary text-sm tracking-[2px] uppercase">Loading...</p>
    </div>
  </div>
}

<!-- Agent X FAB Chat Widget (bottom-right floating assistant) -->
<nxt1-agent-x-fab />

<!-- App Download Promotion Bar (scroll-triggered, smooth slide transition) -->
@if (downloadBar.shouldRender()) {
  <nxt1-app-download-bar
    [visible]="downloadBar.isVisible()"
    [bottomOffset]="downloadBar.bottomOffset()"
    (dismissed)="downloadBar.dismiss()"
  />
}

<!-- Critical Error State -->
@if (error()) {
  <div class="bg-bg-primary p-lg fixed inset-0 flex items-center justify-center">
    <div class="max-w-[400px] text-center">
      <h1 class="text-text-primary mb-md text-2xl">Something went wrong</h1>
      <p class="text-text-secondary mb-lg leading-relaxed">{{ error() }}</p>
      <button
        class="gap-sm px-md py-sm font-brand bg-primary duration-fast hover:bg-primary-600 inline-flex cursor-pointer items-center justify-center rounded-md text-base font-semibold tracking-wide text-black uppercase transition-colors disabled:cursor-not-allowed disabled:opacity-50"
        (click)="ngOnInit()"
      >
        Try Again
      </button>
    </div>
  </div>
}
