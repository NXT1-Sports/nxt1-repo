<!-- 
  Root Application Template
  
  Architecture:
  - Uses Ionic's router outlet for consistent navigation behavior across web/mobile
  - ion-app provides the Ionic framework shell
  - ion-router-outlet handles page transitions and navigation stack
  - Loading overlay shown during initial auth resolution
  - Error boundary for critical failures
-->

<!-- Main Application Shell -->
<ion-app>
  <ion-router-outlet></ion-router-outlet>
</ion-app>

<!-- Loading Overlay (non-blocking) -->
@if (loading()) {
  <div class="fixed inset-0 flex items-center justify-center bg-bg-primary z-modal">
    <div class="flex flex-col items-center gap-lg">
      <div class="flex items-center justify-center">
        <img src="assets/images/nxt1-logo.svg" alt="NXT1 Sports" class="w-[120px] h-auto" width="120" height="40" />
      </div>
      <div class="w-10 h-10 border-[3px] border-border rounded-full border-t-primary animate-spin-slow"></div>
      <p class="text-sm text-text-secondary uppercase tracking-[2px]">Loading...</p>
    </div>
  </div>
}

<!-- Critical Error State -->
@if (error()) {
  <div class="fixed inset-0 flex items-center justify-center bg-bg-primary p-lg">
    <div class="max-w-[400px] text-center">
      <h1 class="text-2xl text-text-primary mb-md">Something went wrong</h1>
      <p class="text-text-secondary leading-relaxed mb-lg">{{ error() }}</p>
      <button
        class="inline-flex items-center justify-center gap-sm px-md py-sm font-brand text-base font-semibold uppercase tracking-wide bg-primary text-black rounded-md cursor-pointer transition-colors duration-fast hover:bg-primary-600 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="ngOnInit()"
      >
        Try Again
      </button>
    </div>
  </div>
}
