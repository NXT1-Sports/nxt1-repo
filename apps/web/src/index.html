<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>NXT1 Sports - The Sports Intelligence Platform | Powered by AI Coordinators</title>
    <base href="/" />

    <!-- Theme color must be early so the script below can update it -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- 
      CRITICAL: Theme initialization script
      This MUST run before any CSS/JS to prevent flash of wrong theme.
      Sets data-theme attribute, color-scheme, background, and theme-color meta tag.
    -->
    <script>
      (function () {
        var pref = localStorage.getItem("nxt1-theme-preference") || "dark";
        var theme = pref;
        if (pref === "system") {
          theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }

        // Check for sport theme override (validate against known sports)
        var sportTheme = localStorage.getItem("nxt1-sport-theme");
        var validSports = [
          "football",
          "basketball",
          "baseball",
          "softball",
          "soccer",
          "volleyball",
          "lacrosse",
          "track",
        ];
        if (sportTheme && validSports.indexOf(sportTheme) === -1) sportTheme = null;
        var dataTheme = sportTheme ? "sport-" + sportTheme : theme;

        // Background colors for each theme
        var bgColors = {
          light: "#ffffff",
          dark: "#0a0a0a",
          "sport-football": "#0d1a0f",
          "sport-basketball": "#3d2000",
          "sport-baseball": "#1a1424",
          "sport-softball": "#1a1818",
          "sport-soccer": "#120909",
          "sport-volleyball": "#140a12",
          "sport-lacrosse": "#08181c",
          "sport-track": "#120a1c",
        };

        var bgColor = bgColors[dataTheme] || bgColors[theme] || "#0a0a0a";

        // Apply theme to document (html and body)
        document.documentElement.setAttribute("data-theme", dataTheme);
        document.documentElement.setAttribute("data-base-theme", theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.style.backgroundColor = bgColor;

        // Also set body background when DOM is ready (for sport themes)
        if (document.body) {
          document.body.style.backgroundColor = bgColor;
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.style.backgroundColor = bgColor;
          });
        }

        // Update theme-color meta tag for browser chrome
        var metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute("content", bgColor);
        }
      })();
    </script>

    <!-- 
      CRITICAL: Pre-hydration styles for Ionic web components
      These styles prevent layout shift (CLS) during SSR hydration.
      They apply to Custom Elements BEFORE they are defined by Ionic.
      Once hydrated, Ionic's internal styles take over.
      
      IMPORTANT: Colors must match theme set by inline script above!
    -->
    <style>
      /* Theme-aware backgrounds for pre-hydration (matches inline script) */
      :root {
        --prehydration-bg: #0a0a0a; /* dark default */
        --prehydration-text: rgba(255, 255, 255, 0.87);
      }

      html[data-theme="light"] {
        --prehydration-bg: #ffffff;
        --prehydration-text: rgba(0, 0, 0, 0.87);
      }

      /* Sport theme backgrounds (all dark-based) */
      html[data-theme="sport-football"] {
        --prehydration-bg: #0d1a0f;
      }
      html[data-theme="sport-basketball"] {
        --prehydration-bg: #3d2000;
      }
      html[data-theme="sport-baseball"] {
        --prehydration-bg: #1a1424;
      }
      html[data-theme="sport-softball"] {
        --prehydration-bg: #1a1818;
      }
      html[data-theme="sport-soccer"] {
        --prehydration-bg: #120909;
      }
      html[data-theme="sport-volleyball"] {
        --prehydration-bg: #140a12;
      }
      html[data-theme="sport-lacrosse"] {
        --prehydration-bg: #08181c;
      }
      html[data-theme="sport-track"] {
        --prehydration-bg: #120a1c;
      }

      /* Ensure body also has correct background */
      body {
        background-color: var(--prehydration-bg);
        margin: 0;
      }

      /*
       * Ionic :not(:defined) CLS guards live in styles-critical.css.
       * Critters inlines them at build time (inlineCritical: true),
       * so they are NOT duplicated here—keeps this <style> block lean.
       *
       * Only theme-aware backgrounds and responsive nav guards remain
       * because they must execute before ANY external CSS arrives.
       */

      /*
       * CRITICAL: Pre-hydration responsive layout guards
       * ────────────────────────────────────────────────────
       * YouTube / LinkedIn / Twitter Pattern (A+ Standard)
       *
       * Both desktop and mobile nav components are always in the DOM.
       * These CSS rules fire BEFORE any JavaScript to ensure the
       * correct set of navigation is visible on the actual viewport.
       *
       * Targets custom element selectors which apply to unknown
       * elements — works before Angular defines the components.
       *
       * Zero-flash, zero-CLS, zero-hydration-mismatch.
       */
      @media (max-width: 767.98px) {
        /* Mobile: column layout, hide desktop nav chrome */
        nxt1-desktop-sidebar,
        nxt1-header,
        app-notification-popover {
          display: none !important;
        }
      }

      @media (min-width: 768px) {
        /* Desktop / Tablet: hide mobile nav chrome */
        nxt1-mobile-header,
        nxt1-mobile-sidebar,
        nxt1-mobile-footer {
          display: none !important;
        }
      }
    </style>

    <link rel="canonical" href="https://nxt1sports.com/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="The sports intelligence platform powered by AI coordinators. Autonomous workflows, AI scout reports, and a unified command center for athletes, coaches, scouts, and teams."
    />
    <meta name="author" content="NXT1 Sports" />
    <meta name="publisher" content="NXT1 Sports" />

    <!-- Internationalization / hreflang (A+ SEO) -->
    <link rel="alternate" hreflang="en-US" href="https://nxt1sports.com/" />
    <link rel="alternate" hreflang="x-default" href="https://nxt1sports.com/" />

    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NXT1 Sports" />
    <meta property="og:title" content="NXT1 Sports — The Sports Intelligence Platform" />
    <meta
      property="og:description"
      content="The sports intelligence platform powered by AI coordinators. Autonomous workflows, comprehensive AI analysis, and a unified command center for athletes, coaches, and scouts."
    />
    <meta property="og:url" content="https://nxt1sports.com/" />
    <meta property="og:image" content="https://nxt1sports.com/assets/images/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NXT1 Sports intelligence platform preview" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nxt1sports" />
    <meta name="twitter:title" content="NXT1 Sports — The Sports Intelligence Platform" />
    <meta
      name="twitter:description"
      content="The sports intelligence platform powered by AI coordinators. Autonomous workflows, comprehensive AI analysis, and a unified command center for athletes, coaches, and scouts."
    />
    <meta name="twitter:image" content="https://nxt1sports.com/assets/images/og-image.jpg" />
    <meta name="twitter:image:alt" content="NXT1 Sports intelligence platform preview" />

    <!-- Additional SEO Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />

    <!-- Sitemap Discovery (faster than robots.txt-only) -->
    <link rel="sitemap" type="application/xml" href="https://nxt1sports.com/sitemap.xml" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!--
      RESOURCE HINTS (A+ Performance Pattern)
      Priority order: preconnect > dns-prefetch > preload
      Only hint origins that are used during initial page load.
    -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://a.espncdn.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
    <link rel="dns-prefetch" href="https://nxt1sports.firebasestorage.app" />

    <!-- Preload deferred styles as non-render-blocking -->
    <link
      rel="preload"
      href="styles-deferred.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript><link rel="stylesheet" href="styles-deferred.css" /></noscript>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="color-scheme" content="light dark" />

    <!-- Apple Touch Icon + PWA Meta -->
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512x512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NXT1" />
    <meta name="application-name" content="NXT1 Sports" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />

    <!-- Analytics: Firebase SDK handles analytics — no gtag.js needed -->
  </head>

  <body style="background-color: #0a0a0a; margin: 0">
    <app-root></app-root>
  </body>
</html>
