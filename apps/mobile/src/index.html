<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>NXT1 Sports</title>

    <base href="/" />

    <!-- 
      CRITICAL: Theme initialization script
      This MUST run before any CSS/JS to prevent flash of wrong theme.
      Sets data-theme attribute and color-scheme before first paint.
    -->
    <script>
      (function () {
        // Get stored preference, default to 'dark' (NXT1 brand)
        var theme = localStorage.getItem("nxt1-theme") || "dark";

        // Apply immediately to prevent flash
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme;

        // Set background color inline to prevent white flash
        document.documentElement.style.backgroundColor = theme === "dark" ? "#0a0a0a" : "#ffffff";
      })();
    </script>

    <meta name="color-scheme" content="dark light" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- iOS PWA settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NXT1 Sports" />

    <!-- Android theme color -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- App icons -->
    <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon/icon.png" />

    <!-- Google Analytics 4 / Firebase Analytics (for browser testing) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-13NF238EE7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-13NF238EE7");
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
