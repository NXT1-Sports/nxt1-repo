<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>NXT1 Sports</title>

    <base href="/" />

    <!-- 
      CRITICAL: Theme initialization script (2026 Professional Pattern)
      This MUST run before any CSS/JS to prevent flash of wrong theme.
      Sets data-theme attribute and color-scheme before first paint.
      
      Storage Keys:
      - nxt1-theme-preference: 'light' | 'dark' | 'system' (user's choice)
      - nxt1-sport-theme: 'football' | 'basketball' | 'baseball' | 'softball' | null (optional sport accent)
    -->
    <script>
      (function () {
        var STORAGE_KEY = "nxt1-theme-preference";
        var SPORT_KEY = "nxt1-sport-theme";

        // Get stored preference, default to 'system'
        var preference = localStorage.getItem(STORAGE_KEY) || "system";
        var sportTheme = localStorage.getItem(SPORT_KEY);

        // Resolve 'system' to actual theme
        var effectiveTheme = preference;
        if (preference === "system") {
          // Check system preference
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          effectiveTheme = prefersDark ? "dark" : "light";
        }

        // Determine final data-theme value
        // If sport theme is set, use sport-specific theme (they're based on dark mode)
        var dataTheme = sportTheme ? "sport-" + sportTheme : effectiveTheme;

        // Apply immediately to prevent flash
        document.documentElement.setAttribute("data-theme", dataTheme);

        // Also store base theme for components that need it
        document.documentElement.setAttribute("data-base-theme", effectiveTheme);

        // Set color-scheme for browser UI (scrollbars, form controls)
        // Sport themes are dark-based
        var colorScheme = sportTheme ? "dark" : effectiveTheme;
        document.documentElement.style.colorScheme = colorScheme;

        // Set background color inline to prevent flash
        var bgColors = {
          light: "#ffffff",
          dark: "#0a0a0a",
          "sport-football": "#0d1a0f",
          "sport-basketball": "#3d2000",
          "sport-baseball": "#1a1424",
          "sport-softball": "#1a1818",
        };
        document.documentElement.style.backgroundColor = bgColors[dataTheme] || bgColors[effectiveTheme] || "#0a0a0a";
      })();
    </script>

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- iOS PWA settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NXT1 Sports" />

    <!-- Native theme color (updated dynamically by ThemeService) -->
    <meta name="theme-color" content="#ffffff" />

    <!-- App icons -->
    <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon/icon.png" />

    <!-- Analytics: Firebase SDK handles analytics on native, web fallback via SDK -->
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
