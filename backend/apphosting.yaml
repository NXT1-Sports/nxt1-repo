# Firebase App Hosting Configuration - Backend (Express.js API)
# rootDirectory MUST be set to "backend" in the Firebase console.

rootDirectory: backend

runtimeConfig:
  nodeVersion: 22

scripts:
  # Move to monorepo root, install all deps, then build just the backend (and @nxt1/core)
  buildCommand: cd .. && npm ci --include=dev && npx turbo run build --filter=@nxt1/backend
  runCommand: node dist/index.js

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 1
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: 'production'
  # Backend builds pull in @nxt1/core declaration generation, which requires devDependencies.
  - variable: NPM_CONFIG_PRODUCTION
    value: 'false'
  - variable: NPM_CONFIG_INCLUDE
    value: 'dev'
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
  - variable: REDIS_URL
    secret: REDIS_URL
    availability:
      - RUNTIME
  - variable: GMAIL_USER
    secret: GMAIL_USER
    availability:
      - RUNTIME
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
    availability:
      - RUNTIME
  - variable: STAGING_GOOGLE_WORKSPACE_MCP_URL
    secret: STAGING_GOOGLE_WORKSPACE_MCP_URL
    availability:
      - RUNTIME
  - variable: PRODUCTION_GOOGLE_WORKSPACE_MCP_URL
    secret: PRODUCTION_GOOGLE_WORKSPACE_MCP_URL
    availability:
      - RUNTIME
  - variable: GOOGLE_WORKSPACE_MCP_URL
    secret: GOOGLE_WORKSPACE_MCP_URL
    availability:
      - RUNTIME
  - variable: STAGING_MICROSOFT_365_MCP_URL
    secret: STAGING_MICROSOFT_365_MCP_URL
    availability:
      - RUNTIME
  - variable: PRODUCTION_MICROSOFT_365_MCP_URL
    secret: PRODUCTION_MICROSOFT_365_MCP_URL
    availability:
      - RUNTIME
  - variable: MICROSOFT_365_MCP_URL
    secret: MICROSOFT_365_MCP_URL
    availability:
      - RUNTIME
  - variable: STAGING_GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    secret: STAGING_GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    availability:
      - RUNTIME
  - variable: PRODUCTION_GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    secret: PRODUCTION_GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    availability:
      - RUNTIME
  - variable: GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    secret: GOOGLE_WORKSPACE_MCP_STATE_BUCKET
    availability:
      - RUNTIME
