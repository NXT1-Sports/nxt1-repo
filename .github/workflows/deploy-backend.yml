# =============================================================================
# NXT1 Backend — Auto Deploy via SSH
# =============================================================================
# Trigger: push to main → deploy production
#
# ── One-time setup: generate a passphrase-free CI deploy key ───────────────
#   Run on your LOCAL machine:
#     ssh-keygen -t ed25519 -C "github-actions-deploy" -f ~/.ssh/nxt1-ci -N ""
#     # -N "" = no passphrase (required for CI)
#
#   Add the public key to the server (one-time):
#     ssh -i ~/path/to/nxt1-server ngocsonxx98@34.72.3.113 \
#       "echo '$(cat ~/.ssh/nxt1-ci.pub)' >> ~/.ssh/authorized_keys"
#
#   Add the private key to GitHub Secrets:
#     cat ~/.ssh/nxt1-ci | pbcopy
#     → GitHub repo → Settings → Secrets and variables → Actions
#     → New repository secret → Name: SSH_PRIVATE_KEY → paste
#
# ── Required Secrets ──────────────────────────────────────────────────
#   SSH_PRIVATE_KEY  — Contents of ~/.ssh/nxt1-ci (passphrase-free)
#   SUDO_PASS        — sudo password for ngocsonxx98
# =============================================================================

name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'packages/core/**'
      - 'packages/cache/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'

  # Manual trigger from GitHub UI
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_HOST: 34.72.3.113
  SSH_USER: ngocsonxx98
  REPO_PATH: /home/vyacheslav_rud1996/nxt1-repo

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        # Write the key directly — no third-party action needed, no passphrase issues
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        # Use sudo -S to pass the password non-interactively
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'ENDSSH'
            echo "${{ secrets.SUDO_PASS }}" | sudo -S bash -c "
              set -e
              cd ${{ env.REPO_PATH }}

              echo 'git stash...'
              git stash

              echo 'git pull...'
              git pull

              # Ensure Node.js 22 is available (install via nvm if needed)
              export NVM_DIR=\"/root/.nvm\"
              if [ ! -s \"\$NVM_DIR/nvm.sh\" ]; then
                echo 'Installing nvm...'
                curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
              fi
              source \"\$NVM_DIR/nvm.sh\"
              nvm install 22
              nvm use 22
              echo \"Node: \$(node -v), npm: \$(npm -v)\"

              # Ensure pm2 is installed under this Node version
              command -v pm2 > /dev/null 2>&1 || npm install -g pm2
              echo "pm2: $(pm2 -v)"

              echo 'Clear stale Turbo cache, @nxt1/core dist, and backend dist...'
              rm -rf packages/core/.turbo packages/core/dist .turbo backend/dist

              echo 'npm ci (clean install from package-lock.json)...'
              npm ci

              echo 'npm run build (backend + shared packages only)...'
              npx turbo run build --filter=@nxt1/backend --filter=@nxt1/core --filter=@nxt1/cache

              echo 'pm2 reload...'
              pm2 reload 1 --update-env
              echo 'Deploy done!'
              pm2 list
            "
          ENDSSH

      - name: Notify success
        if: success()
        run: echo "✅ Deploy succeeded! Commit ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deploy FAILED! See logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
