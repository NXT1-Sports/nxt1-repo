# ============================================================================
# NXT1 Monorepo - Release Workflow
# ============================================================================
# AUTO-RELEASE on push to production branch — version type detected from commits:
#   BREAKING CHANGE / feat!: / fix!:  →  major (x.0.0)
#   feat: / feat(scope):              →  minor (1.x.0)
#   fix: / chore: / docs: / etc.      →  patch (1.2.x)
#
# MANUAL dispatch allows forcing patch/minor/major and creating beta pre-releases.
# ============================================================================

name: Release

on:
  # Auto-release on every push to production — type detected from commit messages
  push:
    branches: [production]
  # Manual dispatch to force a specific type or create a beta pre-release
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release (beta)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Detect release type from commits
        id: detect
        if: github.event_name == 'push'
        run: |
          # Get commits since last tag (or last 50 if no tags yet)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -50)
          fi

          echo "--- Commits since last release ---"
          echo "$COMMITS"

          # Detect highest bump needed:
          # BREAKING CHANGE or !: → major
          # feat: or feat(…): → minor
          # anything else (fix:, chore:, docs:, etc.) → patch
          if echo "$COMMITS" | grep -qiE '^(feat|fix|refactor|perf|style|test|chore|build|ci|docs|revert)(\(.+\))?!:|BREAKING[- ]CHANGE'; then
            RELEASE_TYPE="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            RELEASE_TYPE="minor"
          else
            RELEASE_TYPE="patch"
          fi

          echo "Detected release type: $RELEASE_TYPE"
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        run: |
          # Get current version
          OLD_VERSION=$(node -p "require('./package.json').version")
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT

          # On push: use detected type; on manual dispatch: use the input
          RELEASE_TYPE="${{ github.event_name == 'push' && steps.detect.outputs.release_type || inputs.release_type }}"
          echo "Bumping version: $RELEASE_TYPE"
          npm run version:${RELEASE_TYPE}

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Determine tag prefix
          # prerelease input is only set on manual dispatch; push always produces a full release
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            TAG="v${NEW_VERSION}-beta.$(date +%Y%m%d%H%M)"
          else
            TAG="v${NEW_VERSION}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync appVersion into environment files
        run: node scripts/sync-version.mjs ${{ steps.version.outputs.new_version }}

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Create changelog
          cat << EOF > RELEASE_NOTES.md
          ## What's Changed

          $COMMITS

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.tag }}
          EOF

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true

      - name: Create mobile release tag (triggers mobile build)
        if: inputs.prerelease != 'true'
        run: |
          MOBILE_TAG="mobile-${{ steps.version.outputs.tag }}"
          git tag $MOBILE_TAG
          git push origin $MOBILE_TAG
