# ============================================================================
# NXT1 Monorepo - Web Deployment Pipeline
# ============================================================================
# Deploys web app to Firebase App Hosting
# Supports staging and production environments
# ============================================================================

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'apphosting.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ============================================================================
  # BUILD FOR DEPLOYMENT
  # ============================================================================
  build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: apps/web/.angular
          key: angular-deploy-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            angular-deploy-

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:web
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

  # ============================================================================
  # DEPLOY TO STAGING (Preview Channel)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Firebase App Hosting (Staging)
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          projectId: nxt-1-staging
          channelId: staging
          entryPoint: .

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.details_url }}';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Staging Preview Deployed!**\n\n🔗 ${url}`
            });

  # ============================================================================
  # DEPLOY TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment:
      name: production
      url: https://nxt1.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Firebase App Hosting (Production)
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          projectId: nxt-1-de054
          channelId: live
          entryPoint: .

  # ============================================================================
  # POST-DEPLOYMENT SMOKE TEST
  # ============================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine URL
        id: url
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "url=https://nxt1.app" >> $GITHUB_OUTPUT
          else
            echo "url=${{ needs.deploy-staging.outputs.details_url || 'https://staging.nxt1.app' }}" >> $GITHUB_OUTPUT
          fi

      - name: Health check
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.url }}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed! Status: $STATUS"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ============================================================================
  # NOTIFY ON COMPLETION
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, smoke-test]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Deployment Successful" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Deployment Failed" >> $GITHUB_OUTPUT
          fi

      - name: Notify
        uses: ./.github/actions/notify
        with:
          event_type: 'deploy-web'
          status: ${{ steps.status.outputs.result }}
          title: '${{ steps.status.outputs.emoji }} Web ${{ steps.status.outputs.title }}'
          message: |
            Environment: ${{ inputs.environment || 'staging' }}
            URL: ${{ inputs.environment == 'production' && 'https://nxt1.app' || 'https://staging.nxt1.app' }}
          environment: ${{ inputs.environment || 'staging' }}
          details: |
            {
              "deploy_url": "${{ inputs.environment == 'production' && 'https://nxt1.app' || needs.deploy-staging.outputs.details_url || 'https://staging.nxt1.app' }}",
              "staging_result": "${{ needs.deploy-staging.result }}",
              "production_result": "${{ needs.deploy-production.result }}",
              "smoke_test_result": "${{ needs.smoke-test.result }}"
            }
          n8n_webhook_url: ${{ vars.N8N_WEBHOOK_URL }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          mention_on_failure: '@channel'
