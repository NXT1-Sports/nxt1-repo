name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CI: true

jobs:
  # ============================================================================
  # LINT & TYPECHECK
  # ============================================================================
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: monorepo/package-lock.json

      - name: Install dependencies
        working-directory: monorepo
        run: npm ci

      - name: Lint
        working-directory: monorepo
        run: npm run lint

      - name: Typecheck
        working-directory: monorepo
        run: npm run typecheck

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        package: [core, web, mobile, backend, functions]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: monorepo/package-lock.json

      - name: Install dependencies
        working-directory: monorepo
        run: npm ci

      - name: Build core package
        working-directory: monorepo
        run: npm run build --workspace=@nxt1/core

      - name: Build ${{ matrix.package }}
        working-directory: monorepo
        run: npm run build --workspace=@nxt1/${{ matrix.package }}
        if: matrix.package != 'core'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: |
            monorepo/packages/*/dist
            monorepo/apps/*/dist
            monorepo/backend/dist
          retention-days: 7

  # ============================================================================
  # TEST
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: monorepo/package-lock.json

      - name: Install dependencies
        working-directory: monorepo
        run: npm ci

      - name: Run tests
        working-directory: monorepo
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: monorepo/coverage
          fail_ci_if_error: false

  # ============================================================================
  # E2E Tests (Web)
  # ============================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: monorepo/package-lock.json

      - name: Install dependencies
        working-directory: monorepo
        run: npm ci

      - name: Install Playwright
        working-directory: monorepo/apps/web
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: monorepo/apps/web
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4200

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: monorepo/apps/web/playwright-report
          retention-days: 30
