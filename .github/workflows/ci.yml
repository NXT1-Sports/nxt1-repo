# ============================================================================
# NXT1 Monorepo - Continuous Integration Pipeline
# ============================================================================
# Runs on every PR and push to main/develop
# Uses Turborepo for efficient caching and task orchestration
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ============================================================================
  # DETECT CHANGES - Turborepo intelligent change detection
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      backend: ${{ steps.filter.outputs.backend }}
      functions: ${{ steps.filter.outputs.functions }}
      core: ${{ steps.filter.outputs.core }}
      any_code: ${{ steps.filter.outputs.any_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/src/**'
              - '!apps/web/**/*.spec.ts'
              - '!apps/web/**/*.spec.tsx'
              - '!apps/web/e2e/**'
              - 'packages/core/**'
              - '!packages/core/**/*.spec.ts'
              - 'packages/ui/**'
              - '!packages/ui/**/*.spec.ts'
              - 'package.json'
              - 'turbo.json'
            mobile:
              - 'apps/mobile/src/**'
              - '!apps/mobile/**/*.spec.ts'
              - '!apps/mobile/**/*.spec.tsx'
              - 'packages/core/**'
              - '!packages/core/**/*.spec.ts'
              - 'packages/ui/**'
              - '!packages/ui/**/*.spec.ts'
              - 'package.json'
              - 'turbo.json'
            backend:
              - 'backend/src/**'
              - '!backend/**/*.spec.ts'
              - 'packages/core/**'
              - '!packages/core/**/*.spec.ts'
            functions:
              - 'apps/functions/src/**'
              - '!apps/functions/**/*.spec.ts'
              - 'packages/core/**'
              - '!packages/core/**/*.spec.ts'
            core:
              - 'packages/core/src/**'
              - '!packages/core/**/*.spec.ts'
            any_code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '!**/*.spec.ts'
              - '!**/*.spec.tsx'
              - '!**/*.test.ts'
              - '!**/*.test.tsx'
              - '!**/e2e/**'
              - '**/*.scss'
              - '**/*.css'
              - '**/*.html'
              - 'package-lock.json'
              - '**/package.json'

  # ============================================================================
  # LINT & FORMAT CHECK
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: changes
    if: needs.changes.outputs.any_code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-lint-${{ github.sha }}
          restore-keys: |
            turbo-lint-

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

  # ============================================================================
  # TYPECHECK
  # ============================================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: changes
    if: needs.changes.outputs.any_code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-typecheck-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all packages
        run: npm run typecheck

  # ============================================================================
  # BUILD - Parallel builds for changed packages
  # ============================================================================
  build-core:
    name: Build Core
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-core-${{ github.sha }}
          restore-keys: |
            turbo-build-core-

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist
          retention-days: 1

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [build-core, changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-web-${{ github.sha }}
          restore-keys: |
            turbo-build-web-

      - name: Cache Angular
        uses: actions/cache@v5
        with:
          path: apps/web/.angular
          key: angular-cache-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            angular-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build web application
        run: npm run build:web
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

  build-mobile:
    name: Build Mobile (Web Assets)
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [build-core, changes]
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-mobile-${{ github.sha }}
          restore-keys: |
            turbo-build-mobile-

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run build:mobile
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload mobile web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-www
          path: apps/mobile/www
          retention-days: 1

  # ============================================================================
  # TEST - Run tests for changed packages
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [build-core, changes]
    if: needs.changes.outputs.any_code == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ github.sha }}
          restore-keys: |
            turbo-test-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: unittests
          fail_ci_if_error: false

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: changes
    if: needs.changes.outputs.any_code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ============================================================================
  # PR PREVIEW COMMENT
  # ============================================================================
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [lint, typecheck, build-web, build-mobile, test]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              lint: '${{ needs.lint.result }}',
              typecheck: '${{ needs.typecheck.result }}',
              buildWeb: '${{ needs.build-web.result }}',
              buildMobile: '${{ needs.build-mobile.result }}',
              test: '${{ needs.test.result }}'
            };

            const getEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'skipped') return '⏭️';
              if (result === 'failure') return '❌';
              return '⏳';
            };

            const body = `## CI Results 🚀

            | Check | Status |
            |-------|--------|
            | Lint & Format | ${getEmoji(results.lint)} ${results.lint} |
            | TypeScript | ${getEmoji(results.typecheck)} ${results.typecheck} |
            | Build Web | ${getEmoji(results.buildWeb)} ${results.buildWeb} |
            | Build Mobile | ${getEmoji(results.buildMobile)} ${results.buildMobile} |
            | Tests | ${getEmoji(results.test)} ${results.test} |

            <details>
            <summary>📦 Artifacts</summary>

            Build artifacts are available for download in the Actions tab.
            </details>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('## CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # NOTIFICATIONS (n8n hub or Slack fallback)
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    needs: [lint, typecheck, build-web, build-mobile, test, security]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine overall status
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=CI Failed" >> $GITHUB_OUTPUT
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "title=CI Cancelled" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=CI Passed" >> $GITHUB_OUTPUT
          fi

      - name: Notify
        uses: ./.github/actions/notify
        with:
          event_type: 'ci'
          status: ${{ steps.status.outputs.result }}
          title: '${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.title }} - ${{ github.repository }}'
          message: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
          details: |
            {
              "jobs": {
                "lint": "${{ needs.lint.result }}",
                "typecheck": "${{ needs.typecheck.result }}",
                "build_web": "${{ needs.build-web.result }}",
                "build_mobile": "${{ needs.build-mobile.result }}",
                "test": "${{ needs.test.result }}",
                "security": "${{ needs.security.result }}"
              }
            }

          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          mention_on_failure: '@channel'
