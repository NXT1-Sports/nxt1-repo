# ============================================================================
# NXT1 Monorepo - Mobile Build & Deploy Pipeline
# ============================================================================
# Builds iOS/Android apps using EAS (Expo Application Services)
# Supports development, staging, and production builds
# ============================================================================

name: Deploy Mobile

on:
  push:
    branches: [production]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
      - '.github/workflows/deploy-mobile.yml'
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      submit:
        description: 'Submit to stores after build'
        type: boolean
        default: false

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ============================================================================
  # BUILD WEB ASSETS
  # ============================================================================
  build-web-assets:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable Corepack (enforces packageManager field)
        run: corepack enable npm

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run build:mobile
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: mobile-www
          path: apps/mobile/www
          retention-days: 1

  # ============================================================================
  # BUILD IOS (Using Fastlane)
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-web-assets
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'ios'))
    environment:
      name: ${{ inputs.profile || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable Corepack (enforces packageManager field)
        run: corepack enable npm

      - name: Download web assets
        uses: actions/download-artifact@v8
        with:
          name: mobile-www
          path: apps/mobile/www

      - name: Install Node dependencies
        run: npm ci

      - name: Copy web assets to iOS native
        working-directory: apps/mobile
        run: npx cap copy ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile/ios/App

      # IONGeolocationLib 1.0.1 (a dep of @capacitor/geolocation) ships a
      # pre-compiled XCFramework built with exactly Swift 6.2.3 (swiftlang-6.2.3.3.21).
      # Xcode 26.2 (released Dec 12 2025, build 17C52) is the ONLY version with that
      # exact toolchain. 'latest-stable' picks Xcode 16.4 (the runner default, Swift 6.1.2)
      # which is incompatible. Apple renamed Xcode 17 → Xcode 26 to match iOS/macOS versioning.
      - name: Select Xcode 26.2 (Swift 6.2.3 — exact match for IONGeolocationLib 1.0.1)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: |
          pod repo update
          pod update IONGeolocationLib --no-repo-update
          pod install --repo-update

      - name: Install Fastlane
        run: |
          gem install fastlane -N
          gem install fastlane-plugin-firebase_app_distribution

      - name: Setup code signing
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        working-directory: apps/mobile/ios/App
        run: |
          # Create API key JSON file (format fastlane expects)
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_CONTENT=$(echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | awk 'NF {printf "%s\\n", $0}')
          cat > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.json << EOF
          {
            "key_id": "${APP_STORE_CONNECT_API_KEY_ID}",
            "issuer_id": "${APP_STORE_CONNECT_API_ISSUER_ID}",
            "key": "${KEY_CONTENT}",
            "in_house": false
          }
          EOF

      - name: Determine build type
        id: build-type
        run: |
          PROFILE="${{ inputs.profile || 'development' }}"
          if [ "$PROFILE" == "production" ]; then
            echo "lane=release" >> $GITHUB_OUTPUT
            echo "method=app-store" >> $GITHUB_OUTPUT
          elif [ "$PROFILE" == "staging" ]; then
            echo "lane=beta" >> $GITHUB_OUTPUT
            echo "method=ad-hoc" >> $GITHUB_OUTPUT
          else
            echo "lane=dev" >> $GITHUB_OUTPUT
            echo "method=development" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS app
        working-directory: apps/mobile/ios/App
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
        run: fastlane ${{ steps.build-type.outputs.lane }}

      - name: Upload gym build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-log-${{ inputs.profile || 'development' }}
          path: ~/Library/Logs/gym/App-App.log
          retention-days: 7

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ inputs.profile || 'development' }}
          path: apps/mobile/ios/App/build/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: inputs.submit && (inputs.profile == 'staging' || inputs.profile == 'production')
        working-directory: apps/mobile/ios/App
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: fastlane upload_testflight

  # ============================================================================
  # BUILD ANDROID (Using Fastlane)
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web-assets
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android'))
    environment:
      name: ${{ inputs.profile || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Enable Corepack (enforces packageManager field)
        run: corepack enable npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Download web assets
        uses: actions/download-artifact@v8
        with:
          name: mobile-www
          path: apps/mobile/www

      - name: Install Node dependencies
        run: npm ci

      - name: Copy web assets to Android native
        working-directory: apps/mobile
        run: npx cap copy android

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          # No bundler-cache here — android dir has no Gemfile; fastlane installed directly

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile/android/app/nxt1-release.keystore

          # Create keystore properties
          cat > apps/mobile/android/keystore.properties << EOF
          storeFile=nxt1-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Determine build type
        id: build-type
        run: |
          PROFILE="${{ inputs.profile || 'development' }}"
          if [ "$PROFILE" == "production" ]; then
            echo "lane=release" >> $GITHUB_OUTPUT
            echo "build_type=bundle" >> $GITHUB_OUTPUT
          elif [ "$PROFILE" == "staging" ]; then
            echo "lane=beta" >> $GITHUB_OUTPUT
            echo "build_type=apk" >> $GITHUB_OUTPUT
          else
            echo "lane=dev" >> $GITHUB_OUTPUT
            echo "build_type=apk" >> $GITHUB_OUTPUT
          fi

      - name: Build Android app
        working-directory: apps/mobile/android
        run: fastlane ${{ steps.build-type.outputs.lane }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.profile || 'development' }}
          path: |
            apps/mobile/android/app/build/outputs/apk/**/*.apk
            apps/mobile/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30

      - name: Upload to Play Store (Internal Track)
        if: inputs.submit && inputs.profile == 'staging'
        working-directory: apps/mobile/android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json
          fastlane upload_internal

      - name: Upload to Play Store (Production)
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile/android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json
          fastlane upload_production

  # ============================================================================
  # DISTRIBUTE TO FIREBASE APP DISTRIBUTION (Development/Beta)
  # ============================================================================
  distribute:
    name: Firebase Distribution
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: |
      always() &&
      (needs.build-ios.result == 'success' || needs.build-android.result == 'success') &&
      (inputs.profile == 'development' || inputs.profile == 'staging')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download iOS artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: ios-build-${{ inputs.profile || 'development' }}
          path: artifacts/ios

      - name: Download Android artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: android-build-${{ inputs.profile || 'development' }}
          path: artifacts/android

      - name: Upload iOS to Firebase App Distribution
        if: needs.build-ios.result == 'success'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          groups: internal-testers
          file: artifacts/ios/*.ipa
          releaseNotes: |
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

      - name: Upload Android to Firebase App Distribution
        if: needs.build-android.result == 'success'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          groups: internal-testers
          file: artifacts/android/**/*.apk
          releaseNotes: |
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
