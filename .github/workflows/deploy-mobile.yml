# ============================================================================
# NXT1 Monorepo - Mobile Build & Deploy Pipeline
# ============================================================================
# Builds iOS/Android apps using EAS (Expo Application Services)
# Supports development, staging, and production builds
# ============================================================================

name: Deploy Mobile

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      submit:
        description: 'Submit to stores after build'
        type: boolean
        default: false

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ============================================================================
  # BUILD WEB ASSETS
  # ============================================================================
  build-web-assets:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run build:mobile
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload web assets
        uses: actions/upload-artifact@v7
        with:
          name: mobile-www
          path: apps/mobile/www
          retention-days: 1

  # ============================================================================
  # BUILD IOS (Using Fastlane)
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: build-web-assets
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'ios'))
    environment:
      name: ${{ inputs.profile || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download web assets
        uses: actions/download-artifact@v8
        with:
          name: mobile-www
          path: apps/mobile/www

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile/ios/App

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Install Fastlane
        run: |
          gem install fastlane -N
          gem install fastlane-plugin-firebase_app_distribution

      - name: Setup code signing
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        working-directory: apps/mobile/ios/App
        run: |
          # Create API key file
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Determine build type
        id: build-type
        run: |
          PROFILE="${{ inputs.profile || 'development' }}"
          if [ "$PROFILE" == "production" ]; then
            echo "lane=release" >> $GITHUB_OUTPUT
            echo "method=app-store" >> $GITHUB_OUTPUT
          elif [ "$PROFILE" == "staging" ]; then
            echo "lane=beta" >> $GITHUB_OUTPUT
            echo "method=ad-hoc" >> $GITHUB_OUTPUT
          else
            echo "lane=dev" >> $GITHUB_OUTPUT
            echo "method=development" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS app
        working-directory: apps/mobile/ios/App
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
        run: fastlane ${{ steps.build-type.outputs.lane }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-${{ inputs.profile || 'development' }}
          path: apps/mobile/ios/App/build/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: inputs.submit && (inputs.profile == 'staging' || inputs.profile == 'production')
        working-directory: apps/mobile/ios/App
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: fastlane upload_testflight

  # ============================================================================
  # BUILD ANDROID (Using Fastlane)
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web-assets
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android'))
    environment:
      name: ${{ inputs.profile || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Download web assets
        uses: actions/download-artifact@v8
        with:
          name: mobile-www
          path: apps/mobile/www

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile/android

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile/android/app/nxt1-release.keystore

          # Create keystore properties
          cat > apps/mobile/android/keystore.properties << EOF
          storeFile=nxt1-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Determine build type
        id: build-type
        run: |
          PROFILE="${{ inputs.profile || 'development' }}"
          if [ "$PROFILE" == "production" ]; then
            echo "lane=release" >> $GITHUB_OUTPUT
            echo "build_type=bundle" >> $GITHUB_OUTPUT
          elif [ "$PROFILE" == "staging" ]; then
            echo "lane=beta" >> $GITHUB_OUTPUT
            echo "build_type=apk" >> $GITHUB_OUTPUT
          else
            echo "lane=dev" >> $GITHUB_OUTPUT
            echo "build_type=apk" >> $GITHUB_OUTPUT
          fi

      - name: Build Android app
        working-directory: apps/mobile/android
        run: fastlane ${{ steps.build-type.outputs.lane }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-build-${{ inputs.profile || 'development' }}
          path: |
            apps/mobile/android/app/build/outputs/apk/**/*.apk
            apps/mobile/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30

      - name: Upload to Play Store (Internal Track)
        if: inputs.submit && inputs.profile == 'staging'
        working-directory: apps/mobile/android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json
          fastlane upload_internal

      - name: Upload to Play Store (Production)
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile/android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > google-play-key.json
          fastlane upload_production

  # ============================================================================
  # DISTRIBUTE TO FIREBASE APP DISTRIBUTION (Development/Beta)
  # ============================================================================
  distribute:
    name: Firebase Distribution
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: |
      always() &&
      (needs.build-ios.result == 'success' || needs.build-android.result == 'success') &&
      (inputs.profile == 'development' || inputs.profile == 'staging')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download iOS artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: ios-build-${{ inputs.profile || 'development' }}
          path: artifacts/ios

      - name: Download Android artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: android-build-${{ inputs.profile || 'development' }}
          path: artifacts/android

      - name: Upload iOS to Firebase App Distribution
        if: needs.build-ios.result == 'success'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: artifacts/ios/*.ipa
          releaseNotes: |
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

      - name: Upload Android to Firebase App Distribution
        if: needs.build-android.result == 'success'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: artifacts/android/**/*.apk
          releaseNotes: |
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

  # ============================================================================
  # NOTIFY ON COMPLETION
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-ios, build-android, distribute]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine status
        id: status
        run: |
          IOS_RESULT="${{ needs.build-ios.result }}"
          ANDROID_RESULT="${{ needs.build-android.result }}"

          if [ "$IOS_RESULT" == "failure" ] || [ "$ANDROID_RESULT" == "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Mobile Build Failed" >> $GITHUB_OUTPUT
          elif [ "$IOS_RESULT" == "success" ] || [ "$ANDROID_RESULT" == "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Mobile Build Complete" >> $GITHUB_OUTPUT
          else
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "title=Mobile Build Skipped" >> $GITHUB_OUTPUT
          fi

      - name: Notify
        uses: ./.github/actions/notify
        with:
          event_type: 'deploy-mobile'
          status: ${{ steps.status.outputs.result }}
          title: '${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.title }}'
          message: |
            Platform: ${{ inputs.platform || 'all' }}
            Profile: ${{ inputs.profile || 'development' }}
            iOS: ${{ needs.build-ios.result }} | Android: ${{ needs.build-android.result }}
          environment: ${{ inputs.profile == 'release' && 'production' || 'development' }}
          details: |
            {
              "platform": "${{ inputs.platform || 'all' }}",
              "profile": "${{ inputs.profile || 'development' }}",
              "ios_result": "${{ needs.build-ios.result }}",
              "android_result": "${{ needs.build-android.result }}",
              "distribute_result": "${{ needs.distribute.result }}",
              "submit_to_store": ${{ inputs.submit_to_store || false }}
            }
          n8n_webhook_url: ${{ vars.N8N_WEBHOOK_URL }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          mention_on_failure: '@mobile-team'
